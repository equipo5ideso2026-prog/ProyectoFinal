<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernesto Investing AI · Análisis NLP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    (function verificarSesion() {
      const usuarioActivo = localStorage.getItem('investai_user');
      if (!usuarioActivo) {
        alert("🔒 Acceso denegado. Por favor, inicia sesión para acceder al sistema InvestAI.");
        window.location.replace("modulo6.1-autenticacion.html");
      }
    })();
  tailwind.config = { theme: { extend: { colors: { azulinst: '#1F3864', azulinst2: '#16294C', oro: '#C5961A', oroclaro: '#E4B94E', verdeok: '#3C8C5B', rojoalerta: '#B23B3B' }, fontFamily: { display: ['Georgia', 'Cambria', 'serif'], mono: ['Consolas', 'Menlo', 'monospace'] } } } }
</script>
<style>body { background-color: #10182B; }</style>
</head>
<body class="min-h-screen text-slate-100 font-sans">

  <nav class="flex flex-wrap items-center justify-between gap-3 px-6 md:px-10 py-5 border-b border-azulinst/60">
    <a href="index.html" class="font-mono text-xs text-slate-400 hover:text-oroclaro transition">← Volver al portal</a>
    <div class="font-mono text-xs tracking-widest uppercase text-slate-400">Ernesto <span class="text-oroclaro font-semibold">Investing AI</span></div>
    <div class="flex items-center gap-2 font-mono text-xs text-slate-400">
      <span id="statusDot" class="w-2 h-2 rounded-full bg-verdeok"></span>
      <span id="statusText">API conectada</span>
    </div>
  </nav>

  <header class="px-6 md:px-10 pt-9 pb-6">
    <h1 class="font-display font-bold text-3xl md:text-4xl">Sentimiento de Mercado NLP</h1>
    <p class="mt-2 text-slate-300 text-sm max-w-2xl">Procesamiento de Lenguaje Natural combinado: VADER SentimentIntensityAnalyzer + GPT-4o Complementary Classifier.</p>
  </header>

  <main class="px-6 md:px-10 pb-16">
    <!-- Panel de Filtros y Gráficos -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-8">
      
      <!-- Filtros -->
      <div class="bg-azulinst2 border border-azulinst rounded-md p-5 flex flex-col justify-between">
        <h2 class="font-mono text-xs tracking-wide uppercase text-slate-400 mb-4">Filtros de Búsqueda</h2>
        <div class="space-y-4 font-mono text-sm">
          <div>
            <label class="block text-slate-400 mb-1">Ticker / Activo</label>
            <select id="tickerFilter" class="w-full bg-azulinst/50 border border-azulinst rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-oro">
              <option value="ALL">Todos los activos</option>
            </select>
          </div>
          <div>
            <label class="block text-slate-400 mb-1">Desde</label>
            <input type="date" id="dateFrom" class="w-full bg-azulinst/50 border border-azulinst rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-oro">
          </div>
        </div>
        <button onclick="filterAndRender()" class="mt-4 w-full bg-azulinst border border-azulinst hover:border-oro text-slate-200 py-2 rounded transition">Aplicar Filtros</button>
      </div>

      <!-- Gráfico Distribución -->
      <div class="bg-azulinst2 border border-azulinst rounded-md p-5">
        <h2 class="font-mono text-xs tracking-wide uppercase text-slate-400 mb-4">Distribución</h2>
        <div class="h-40 relative"><canvas id="distChart"></canvas></div>
      </div>

      <!-- Velocímetro -->
      <div class="bg-azulinst2 border border-azulinst rounded-md p-5 flex flex-col items-center">
        <h2 class="font-mono text-xs tracking-wide uppercase text-slate-400 mb-4 self-start">Sentimiento Global</h2>
        <div class="h-32 w-full relative flex justify-center items-center">
          <canvas id="gaugeChart"></canvas>
          <div class="absolute text-center mt-10">
            <span id="gaugeLabel" class="text-xs uppercase font-bold tracking-wider font-mono text-slate-400">NEUTRAL</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Feed -->
    <h2 class="font-mono text-xs tracking-wide uppercase text-slate-400 mb-4">Feed de Noticias <span id="newsCount" class="text-oroclaro ml-2"></span></h2>
    <div id="newsFeed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  </main>

  <script>
    // Datos simulados (mismos del archivo original)
    const newsData = [
      { ticker: "FSM", titulo: "Fortuna Silver Mines reporta incremento del 18%", fuente: "Mining Weekly", fecha: "2026-06-12", resumen: "La minera superó las expectativas...", vader_compound: 0.76, gpt4_sentiment: "BULLISH" },
      { ticker: "BVN", titulo: "Buenaventura enfrenta paralización en mina", fuente: "Gestión Perú", fecha: "2026-06-12", resumen: "Comunidades bloquearon el acceso...", vader_compound: -0.61, gpt4_sentiment: "BEARISH" },
      { ticker: "BHP", titulo: "BHP mantiene guidance de producción", fuente: "Reuters", fecha: "2026-06-11", resumen: "El gigante australiano confirmó...", vader_compound: 0.03, gpt4_sentiment: "NEUTRAL" },
      { ticker: "ABX.TO", titulo: "Barrick Gold anuncia nuevo yacimiento", fuente: "Northern Miner", fecha: "2026-06-11", resumen: "Resultados de perforación...", vader_compound: 0.82, gpt4_sentiment: "BULLISH" },
      { ticker: "VOLCABC1.LM", titulo: "Volcán reduce deuda corporativa", fuente: "Bolsa de Valores", fecha: "2026-06-10", resumen: "Prepago anticipado de obligaciones...", vader_compound: 0.65, gpt4_sentiment: "BULLISH" }
    ];

    let distChart, gaugeChart;

    document.addEventListener("DOMContentLoaded", () => {
      const select = document.getElementById("tickerFilter");
      [...new Set(newsData.map(i => i.ticker))].forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
      document.getElementById("dateFrom").value = "2026-06-01";
      filterAndRender();
    });

    function filterAndRender() {
      const tFilter = document.getElementById("tickerFilter").value;
      const data = newsData.filter(i => tFilter === "ALL" || i.ticker === tFilter);
      
      document.getElementById("newsCount").textContent = `(${data.length})`;
      
      const feed = document.getElementById("newsFeed");
      feed.innerHTML = data.map(news => {
        const isBull = news.gpt4_sentiment === "BULLISH";
        const isBear = news.gpt4_sentiment === "BEARISH";
        const color = isBull ? 'text-verdeok border-verdeok/30' : (isBear ? 'text-rojoalerta border-rojoalerta/30' : 'text-slate-400 border-slate-600');
        
        return `<div class="bg-azulinst2 border border-azulinst rounded-md p-5 hover:border-oro transition flex flex-col">
          <div class="flex justify-between items-center mb-2 font-mono text-xs">
            <span class="bg-azulinst px-2 py-1 rounded text-oroclaro font-bold">${news.ticker}</span>
            <span class="text-slate-500">${news.fecha}</span>
          </div>
          <h3 class="font-bold text-slate-200 mb-2">${news.titulo}</h3>
          <p class="text-sm text-slate-400 mb-4 flex-1">${news.resumen}</p>
          <div class="pt-3 border-t border-azulinst flex justify-between font-mono text-xs items-center">
            <span class="text-slate-500">VADER: <span class="${color.split(' ')[0]} font-bold">${news.vader_compound}</span></span>
            <span class="border px-2 py-1 rounded ${color}">${news.gpt4_sentiment}</span>
          </div>
        </div>`;
      }).join('');

      updateCharts(data);
    }

    function updateCharts(data) {
      const counts = [
        data.filter(i => i.gpt4_sentiment === "BULLISH").length,
        data.filter(i => i.gpt4_sentiment === "NEUTRAL").length,
        data.filter(i => i.gpt4_sentiment === "BEARISH").length
      ];

      if(distChart) distChart.destroy();
      distChart = new Chart(document.getElementById('distChart'), {
        type: 'bar',
        data: { labels: ['Bull', 'Neu', 'Bear'], datasets: [{ data: counts, backgroundColor: ['#3C8C5B', '#64748b', '#B23B3B'] }] },
        options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#1F3864' }, ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } }, maintainAspectRatio: false }
      });

      const avg = data.reduce((acc, i) => acc + i.vader_compound, 0) / (data.length || 1);
      const val = Math.round(((avg + 1) / 2) * 100);
      let lbl = "NEUTRAL", col = "#94a3b8";
      if(avg >= 0.15) { lbl = "ALCISTA"; col = "#3C8C5B"; } else if(avg <= -0.15) { lbl = "BAJISTA"; col = "#B23B3B"; }
      
      document.getElementById('gaugeLabel').textContent = lbl;
      document.getElementById('gaugeLabel').style.color = col;

      if(gaugeChart) gaugeChart.destroy();
      gaugeChart = new Chart(document.getElementById('gaugeChart'), {
        type: 'doughnut',
        data: { datasets: [{ data: [val, 100-val], backgroundColor: [col, '#1F3864'], borderWidth: 0 }] },
        options: { rotation: 270, circumference: 180, cutout: '80%', maintainAspectRatio: false, plugins: { tooltip: { enabled: false } } }
      });
    }
  </script>
</body>
</html>
