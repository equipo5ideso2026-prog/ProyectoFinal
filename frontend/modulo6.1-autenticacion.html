<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernesto Investing AI · Autenticación</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  
  tailwind.config = {
    theme: {
      extend: {
        colors: { azulinst: '#1F3864', azulinst2: '#16294C', oro: '#C5961A', oroclaro: '#E4B94E', verdeok: '#3C8C5B', rojoalerta: '#B23B3B' },
        fontFamily: { display: ['Georgia', 'Cambria', 'serif'], mono: ['Consolas', 'Menlo', 'monospace'] }
      }
    }
  }
</script>
<style>body { background-color: #10182B; }</style>
</head>
<body class="min-h-screen text-slate-100 font-sans flex flex-col">

  <nav class="flex flex-wrap items-center justify-between gap-3 px-6 md:px-10 py-5 border-b border-azulinst/60">
    <a href="index.html" class="font-mono text-xs text-slate-400 hover:text-oroclaro transition">← Volver al portal</a>
    <div class="font-mono text-xs tracking-widest uppercase text-slate-400">Ernesto <span class="text-oroclaro font-semibold">Investing AI</span></div>
    <div class="flex items-center gap-2 font-mono text-xs text-slate-400">
      <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-500"></span>
      <span id="statusText">Verificando…</span>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center p-6">
    <div class="bg-azulinst2 border border-azulinst rounded-md p-8 w-full max-w-md shadow-xl">
      <div id="view-login">
        <h2 class="font-display font-bold text-2xl mb-2">Iniciar sesión</h2>
        <p class="text-slate-400 text-sm mb-6 font-mono">Accede al sistema predictivo</p>
        
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-mono text-slate-400 mb-1">Correo electrónico</label>
            <input id="logEmail" type="email" class="w-full bg-azulinst/50 border border-azulinst rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-oro font-mono text-sm">
          </div>
          <div>
            <label class="block text-xs font-mono text-slate-400 mb-1">Contraseña</label>
            <input id="logPass" type="password" class="w-full bg-azulinst/50 border border-azulinst rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-oro font-mono text-sm">
          </div>
          <button onclick="login()" class="w-full bg-oro hover:bg-oroclaro text-azulinst2 font-bold py-2.5 rounded transition mt-4">Ingresar</button>
        </div>
        <p id="logMsg" class="mt-4 text-xs font-mono text-rojoalerta text-center"></p>
        <div class="mt-6 text-center text-sm text-slate-400">
          ¿No tienes cuenta? <button onclick="toggleView('register')" class="text-oroclaro hover:underline">Regístrate</button>
        </div>
      </div>

      <div id="view-register" class="hidden">
        <h2 class="font-display font-bold text-2xl mb-2">Crear cuenta</h2>
        <p class="text-slate-400 text-sm mb-6 font-mono">Registro en SQLite (backend)</p>
        
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-mono text-slate-400 mb-1">Nombre completo</label>
            <input id="regName" type="text" class="w-full bg-azulinst/50 border border-azulinst rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-oro font-mono text-sm">
          </div>
          <div>
            <label class="block text-xs font-mono text-slate-400 mb-1">Correo electrónico</label>
            <input id="regEmail" type="email" class="w-full bg-azulinst/50 border border-azulinst rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-oro font-mono text-sm">
          </div>
          <div>
            <label class="block text-xs font-mono text-slate-400 mb-1">Contraseña</label>
            <input id="regPass" type="password" class="w-full bg-azulinst/50 border border-azulinst rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-oro font-mono text-sm">
          </div>
          <button onclick="register()" class="w-full bg-azulinst border border-oro hover:bg-azulinst/80 text-oroclaro font-bold py-2.5 rounded transition mt-4">Crear cuenta</button>
        </div>
        <p id="regMsg" class="mt-4 text-xs font-mono text-rojoalerta text-center"></p>
        <div class="mt-6 text-center text-sm text-slate-400">
          ¿Ya tienes cuenta? <button onclick="toggleView('login')" class="text-oroclaro hover:underline">Inicia sesión</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API_URL = sessionStorage.getItem('apiUrl');
    
    // Estado de red
    if(!API_URL) {
      document.getElementById('statusDot').className = 'w-2 h-2 rounded-full bg-rojoalerta';
      document.getElementById('statusText').textContent = 'Sin API';
    } else {
      document.getElementById('statusDot').className = 'w-2 h-2 rounded-full bg-verdeok';
      document.getElementById('statusText').textContent = 'API conectada';
    }

    function toggleView(view) {
      document.getElementById('view-login').classList.toggle('hidden', view !== 'login');
      document.getElementById('view-register').classList.toggle('hidden', view !== 'register');
      document.getElementById('logMsg').textContent = '';
      document.getElementById('regMsg').textContent = '';
    }

    async function login() {
      const email = document.getElementById('logEmail').value;
      const pass = document.getElementById('logPass').value;
      const msg = document.getElementById('logMsg');
      if(!API_URL) return msg.textContent = 'Falta conectar la API en el portal.';
      
      try {
        const res = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
          body: JSON.stringify({ email, password: pass })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.detail || 'Credenciales incorrectas');
        
        localStorage.setItem('investai_user', JSON.stringify({ email: data.email, nombre: data.nombre }));
        window.location.href = 'modulo_mercado.html';
      } catch (err) { msg.textContent = err.message; }
    }

    async function register() {
      const nombre = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPass').value;
      const msg = document.getElementById('regMsg');
      if(!API_URL) return msg.textContent = 'Falta conectar la API en el portal.';

      try {
        const res = await fetch(`${API_URL}/api/auth/registro`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
          body: JSON.stringify({ nombre, email, password: pass, perfil: "moderado" })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.detail || 'Error al registrar');
        
        msg.className = 'mt-4 text-xs font-mono text-verdeok text-center';
        msg.textContent = 'Registro exitoso. Inicia sesión.';
        setTimeout(() => toggleView('login'), 2000);
      } catch (err) { msg.className = 'mt-4 text-xs font-mono text-rojoalerta text-center'; msg.textContent = err.message; }
    }
  </script>
</body>
</html>
