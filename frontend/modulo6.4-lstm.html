<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ernesto Investing AI · Pronósticos LSTM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script>
  (function verificarSesion() {
      const usuarioActivo = localStorage.getItem('investai_user');
      if (!usuarioActivo) {
        alert("🔒 Acceso denegado. Por favor, inicia sesión para acceder al sistema InvestAI.");
        window.location.replace("modulo6.1-autenticacion.html");
      }
    })();
  tailwind.config = { theme: { extend: { colors: { azulinst: '#1F3864', azulinst2: '#16294C', oro: '#C5961A', oroclaro: '#E4B94E', verdeok: '#3C8C5B', rojoalerta: '#B23B3B' }, fontFamily: { display: ['Georgia', 'Cambria', 'serif'], mono: ['Consolas', 'Menlo', 'monospace'] } } } }
</script>
<style>body { background-color: #10182B; }</style>
</head>
<body class="min-h-screen text-slate-100 font-sans">

  <nav class="flex flex-wrap items-center justify-between gap-3 px-6 md:px-10 py-5 border-b border-azulinst/60">
    <a href="index.html" class="font-mono text-xs text-slate-400 hover:text-oroclaro transition">← Volver al portal</a>
    <div class="font-mono text-xs tracking-widest uppercase text-slate-400">Ernesto <span class="text-oroclaro font-semibold">Investing AI</span></div>
    <div class="flex items-center gap-2 font-mono text-xs text-slate-400">
      <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-500"></span>
      <span id="statusText">Verificando…</span>
    </div>
  </nav>

  <header class="px-6 md:px-10 pt-9 pb-2">
    <h1 class="font-display font-bold text-3xl md:text-4xl">Pronósticos LSTM</h1>
    <p class="mt-2 text-slate-300 text-sm max-w-2xl">Regresión iterativa a N días calculada con TensorFlow y servida mediante la API.</p>
  </header>

  <div class="px-6 md:px-10 pt-6 flex flex-wrap gap-4 items-center">
    <div id="tickerBar" class="flex gap-2">
      <button data-ticker="FSM" class="ticker-chip bg-oro text-azulinst2 border border-oro font-semibold px-4 py-2 rounded text-xs font-mono">FSM</button>
      <button data-ticker="BVN" class="ticker-chip bg-azulinst2 border border-azulinst text-slate-300 hover:border-oro px-4 py-2 rounded text-xs font-mono transition">BVN</button>
      <button data-ticker="ABX.TO" class="ticker-chip bg-azulinst2 border border-azulinst text-slate-300 hover:border-oro px-4 py-2 rounded text-xs font-mono transition">ABX.TO</button>
      <button data-ticker="VOLCABC1.LM" class="ticker-chip bg-azulinst2 border border-azulinst text-slate-300 hover:border-oro px-4 py-2 rounded text-xs font-mono transition">VOLCABC1.LM</button>
      <button data-ticker="BHP" class="ticker-chip bg-azulinst2 border border-azulinst text-slate-300 hover:border-oro px-4 py-2 rounded text-xs font-mono transition">BHP</button>
    </div>
    <div class="ml-auto flex items-center gap-3">
      <label class="text-xs font-mono text-slate-400">Horizonte (días):</label>
      <input id="horizonte" type="range" min="7" max="60" value="30" class="w-32 accent-oro" onchange="updateHorizon(this.value)">
      <span id="horizonteVal" class="text-sm font-mono font-bold text-oroclaro">30</span>
    </div>
  </div>

  <p id="stateMsg" class="px-6 md:px-10 pt-5 font-mono text-xs text-slate-400"></p>

  <main id="dashboard" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-5 px-6 md:px-10 pt-5 pb-16">
    <div class="col-span-1 lg:col-span-3 bg-azulinst2 border border-azulinst rounded-md p-5">
      <div id="chart" class="w-full h-[400px]"></div>
    </div>
    <div class="flex flex-col gap-5">
      <div class="bg-azulinst2 border border-azulinst rounded-md p-5">
        <span class="block font-mono text-xs tracking-wide uppercase text-slate-400 mb-3">Métricas del Modelo</span>
        <div class="flex justify-between py-2 border-b border-azulinst font-mono">
          <span class="text-xs text-slate-400">RMSE</span><span id="valRmse" class="text-sm font-semibold text-oroclaro">—</span>
        </div>
        <div class="flex justify-between py-2 border-b border-azulinst font-mono">
          <span class="text-xs text-slate-400">RMSE %</span><span id="valRmsePct" class="text-sm font-semibold">—</span>
        </div>
        <div class="flex justify-between py-2 border-b border-azulinst font-mono">
          <span class="text-xs text-slate-400">MAE</span><span id="valMae" class="text-sm font-semibold">—</span>
        </div>
        <div class="flex justify-between py-2 font-mono">
          <span class="text-xs text-slate-400">R² Score</span><span id="valR2" class="text-sm font-semibold">—</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API_URL = sessionStorage.getItem('apiUrl');
    let currentTicker = 'FSM';
    let currentHorizonte = 30;
    
    if(!API_URL) {
      document.getElementById('stateMsg').textContent = 'Falta conectar la API.';
      document.getElementById('stateMsg').className = 'px-6 md:px-10 pt-5 font-mono text-xs text-rojoalerta';
    } else {
      document.getElementById('statusDot').className = 'w-2 h-2 rounded-full bg-verdeok';
      document.getElementById('statusText').textContent = 'API conectada';
      init();
    }

    function init() {
      document.querySelectorAll('.ticker-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.ticker-chip').forEach(c => c.className = 'ticker-chip bg-azulinst2 border border-azulinst text-slate-300 hover:border-oro px-4 py-2 rounded text-xs font-mono transition');
          chip.className = 'ticker-chip bg-oro text-azulinst2 border border-oro font-semibold px-4 py-2 rounded text-xs font-mono';
          currentTicker = chip.dataset.ticker;
          cargarLSTM();
        });
      });
      cargarLSTM();
    }

    function updateHorizon(val) {
      document.getElementById('horizonteVal').textContent = val;
      currentHorizonte = val;
      cargarLSTM();
    }

    async function cargarLSTM() {
      const msg = document.getElementById('stateMsg');
      const dash = document.getElementById('dashboard');
      msg.textContent = `Calculando proyección a ${currentHorizonte} días para ${currentTicker}…`;
      dash.classList.add('hidden');

      try {
        const res = await fetch(`${API_URL}/api/lstm/${currentTicker}?horizonte=${currentHorizonte}`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
        if(!res.ok) throw new Error('Error al conectar con endpoint LSTM');
        const data = await res.json();
        
        document.getElementById('valRmse').textContent = `$${data.metricas_error.rmse_usd.toFixed(4)}`;
        document.getElementById('valRmsePct').textContent = `${data.metricas_error.rmse_porcentaje.toFixed(2)}%`;
        document.getElementById('valMae').textContent = `$${data.metricas_error.mae_usd.toFixed(4)}`;
        document.getElementById('valR2').textContent = data.metricas_error.r2_score.toFixed(4);

        dibujarPlotly(data);
        msg.textContent = '';
        dash.classList.remove('hidden');
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'px-6 md:px-10 pt-5 font-mono text-xs text-rojoalerta';
      }
    }

    function dibujarPlotly(data) {
      const hist = data.historico_validacion;
      const fut = data.proyeccion_futura;

      const fechasHist = hist.map(d => d.fecha);
      const allFechas = [...fechasHist, ...fut.map(d => d.fecha)];
      const nullPad = new Array(hist.length).fill(null);

      const trazaReal = { x: allFechas, y: [...hist.map(d => d.real), ...nullPad], type: 'scatter', name: 'Real', line: { color: '#94A3B8' }};
      const trazaPredHist = { x: allFechas, y: [...hist.map(d => d.predicho), ...nullPad], type: 'scatter', name: 'Validación', line: { color: '#38BDF8', dash: 'dot' }};
      const trazaPredFut = { x: allFechas, y: [...nullPad, ...fut.map(d => d.prediccion_usd)], type: 'scatter', name: 'Proyección', line: { color: '#C5961A', width: 2 }};

      const layout = {
        paper_bgcolor: '#16294C', plot_bgcolor: '#16294C', font: { color: '#94A3B8', family: 'Consolas, monospace' },
        margin: { l: 40, r: 20, t: 20, b: 30 },
        xaxis: { gridcolor: '#1F3864' }, yaxis: { gridcolor: '#1F3864' }
      };

      Plotly.newPlot('chart', [trazaReal, trazaPredHist, trazaPredFut], layout, { responsive: true, displayModeBar: false });
    }
  </script>
</body>
</html>
